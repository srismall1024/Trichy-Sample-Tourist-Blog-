<!DOCTYPE html>
<html>
<head>
    <title>Temple Navigation</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("https://www.holidify.com/images/cmsuploads/compressed/shutterstock_349138910_20200117163511.png");
            background-size: cover;
            background-position: center;
        }
        section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            border: 3px solid darkblue;
            border-radius: 8px;
            background-color: rgba(127, 255, 212, 0.9); /* transparent aquamarine */
            margin: 20px;
        }
        nav ol {
            display: flex;
            flex-direction: column;
            gap: 20px;
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        nav ol li {
            font-size: 18px;
            font-weight: bold;
        }
        nav ol li a {
            text-decoration: none;
            color: darkblue;
            padding: 8px 15px;
            border-radius: 4px;
            transition: 0.3s ease;
        }
        nav ol li a:hover {
            background-color: darkblue;
            color: white;
        }
    </style>
</head>
<body>
    <section>
        <nav>
            <ol>
                <li><a href="tem1.html" target="f2">Srirangam Temple</a></li>
                <li><a href="tem2.html" target="f2">Thiruvanaikovil Temple</a></li>
                <li><a href="tem4.html" target="f2">Vayalur Temple</a></li>
                <li><a href="tem3.html" target="f2">Malaikottai Temple</a></li>
            </ol>
        </nav>
    </section>
</body>
</html>
