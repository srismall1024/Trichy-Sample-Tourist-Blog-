<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    /* Hero section with image background */
    .hero {
      position: relative;
      height: 100vh;
      background-image: url("https://sriagasthiyanadi.com/wp-content/uploads/2023/02/Airavathesvara-Temple.jpg");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    /* Overlay for better readability */
    .hero::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.4);
      z-index: 1;
    }

    .hero h1 {
      position: relative;
      z-index: 2;
      font-size: 3em;
      padding: 20px;
      background-color: rgba(0,0,0,0.3);
      border-radius: 10px;
    }

    /* Optional: Add a button for navigation */
    .hero a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #4ebbbb;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
      transition: 0.3s;
    }

    .hero a:hover {
      background-color: #3a8c8c;
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>WELCOME TO TRICHY TEMPLES</h1>
  </section>

</body>
</html>
