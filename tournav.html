<!DOCTYPE html>
<html>
<head>
    <title>Tourist Navigation</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("https://thvnext.bing.com/th/id/OIP.wohXu6zDp8q1XU2RZvjm2AHaE8?w=351&h=191&c=7&r=0&o=7&cb=ucfimgc2&dpr=1.1&pid=1.7&rm=3");
            background-size: cover;
            background-position: center;
        }
        section {
            display: flex;
            justify-content: center;
            padding: 15px;
            border: 3px solid darkblue;
            border-radius: 8px;
            background-color: rgba(127, 255, 212, 0.9); /* transparent aquamarine */
            margin: 20px;
        }
        nav ol {
            display: flex;
            flex-direction: column;
            gap: 12px;
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        nav ol li {
            font-size: 18px;
            font-weight: bold;
        }
        nav ol li a {
            text-decoration: none;
            color: darkblue;
            padding: 8px 15px;
            border-radius: 4px;
            transition: 0.3s ease;
            display: block;
        }
        nav ol li a:hover {
            background-color: darkblue;
            color: white;
        }
    </style>
</head>
<body>
    <section>
        <nav>
            <ol>
                <li><a href="kallanai.html" target="f2">Kallanai Dam</a></li>
                <li><a href="muku.html" target="f2">Mukkombu Dam and Park</a></li>
                <li><a href="butterfly.html" target="f2">Butterfly Park</a></li>
                <li><a href="birds.html" target="f2">Birds Park</a></li>
                <li><a href="basilca.html" target="f2">Poondi Matha Basilica</a></li>
                <li><a href="planet.html" target="f2">Anna Planetorium</a></li>
            </ol>
        </nav>
    </section>
</body>
</html>
