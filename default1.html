<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url("https://thvnext.bing.com/th/id/OIP.r-SIDxNVXRZ9DUqxGbdrmQHaE8?w=348&h=190&c=7&r=0&o=7&cb=ucfimgc2&dpr=1.1&pid=1.7&rm=3");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
    }

    /* Hero section */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* Overlay for text readability */
    .hero::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.4);
      z-index: 1;
    }

    .hero h1 {
      position: relative;
      z-index: 2;
      font-size: 3em;
      padding: 20px;
      background-color: rgba(0,0,0,0.3);
      border-radius: 10px;
    }

    /* Optional navigation buttons */
    .hero a {
      position: relative;
      z-index: 2;
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background-color: #4ebbbb;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
      transition: 0.3s;
    }

    .hero a:hover {
      background-color: #3a8c8c;
    }

  </style>
</head>
<body>

  <section class="hero">
    <div>
      <h1>WELCOME TO TRICHY TOURIST SPOTS</h1>
      <a href="tourist_details.html">Explore Now</a>
    </div>
  </section>

</body>
</html>
