<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trichy Tourism - Digital Travel Guide</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; background: var(--primary); color: white; padding: 20px; border-radius: 12px; }
        
        .action-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-download { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .junction-section { margin-bottom: 30px; }
        .junction-title { border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 15px; color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--white); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .distance-tag { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; margin-top: 10px; }
        
        .upcoming-box { background: #fff3e0; border: 1px dashed #ff9800; padding: 20px; border-radius: 10px; margin-top: 40px; }
        .upcoming-grid { columns: 2; gap: 20px; }

        @media (max-width: 600px) { .upcoming-grid { columns: 1; } }
    </style>
</head>
<body>

<div class="container" id="tour-content">
    <header>
        <h1>🚩 Tiruchirappalli Tourism Guide</h1>
        <p>Plan your journey based on your arrival point</p>
    </header>

    <div class="action-bar">
        <button class="btn-download" onclick="downloadPDF()">📥 Download Itinerary (PDF)</button>
    </div>

    <div id="main-guide">
        </div>

    <div class="upcoming-box">
        <h3>✨ Upcoming Updates (Places to be Added)</h3>
        <p><i>You can visit these places whenever you are passing nearby:</i></p>
        <div class="upcoming-grid" id="upcoming-list"></div>
        <p style="margin-top: 15px; font-size: 0.9em; color: #666;">Note: Nearby veg restaurants are available near main temple entrances.</p>
    </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
